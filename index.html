<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>25° Anniversario — Marco & Sofia</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="fixed-header">
      <div class="header-inner">
        <div class="header-left">
          <div class="header-names" id="hero-names">Marco & Sofia</div>
          <div class="header-title">25° Anniversario</div>
        </div>
        <div class="header-right">
          <div class="header-badge" id="hero-range">
            15 Giugno 2000 — 15 Giugno 2025
          </div>
        </div>
      </div>
    </header>

    <main class="timeline-container">
      <div class="timeline" id="timeline-main"></div>
    </main>

    <div class="modal-overlay" id="p-ov">
      <aside class="modal-window">
        <button class="modal-close" id="p-close">✕</button>
        <div class="modal-body">
          <div class="modal-header-img">
            <img id="p-cover" src="" alt="" />
          </div>
          <div class="modal-content">
            <div class="modal-meta">
              <h2 id="p-cover-title"></h2>
              <p class="modal-date-val" id="p-full-date"></p>
            </div>
            <p class="panel-desc" id="p-desc"></p>
            <div class="gallery-label">Fotografie</div>
            <div class="gallery-scroll" id="p-gallery"></div>
          </div>
        </div>
      </aside>
    </div>

    <div class="lb" id="lb">
      <button class="lb-close" id="lb-close">✕</button>
      <button class="lb-nav lb-prev" id="lb-prev">‹</button>
      <button class="lb-nav lb-next" id="lb-next">›</button>
      <div class="lb-content"><img id="lb-img" src="" alt="" /></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
