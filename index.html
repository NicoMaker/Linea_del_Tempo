<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>25° Anniversario — Marco &amp; Sofia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════
   ROOT & RESET
══════════════════════════════════════ */
:root{
  --gold:#c9a84c;--gold-l:#f0d080;--gold-d:#7a5e20;
  --cream:#fdf8f0;--dark:#1a1208;--dark2:#2e1f0a;
  --charcoal:#3a2e1e;--text:#3d2c0e;--muted:#7a6547;
  --line:#d4b87a;--shadow:rgba(30,15,0,.18);
  --overlay:rgba(15,8,0,.88);--radius:16px;
  --tr:.35s cubic-bezier(.4,0,.2,1);
  --panel-w:520px;
  --c-amore:#d4496b;--c-viaggio:#2b7abf;--c-famiglia:#4caf7d;
  --c-casa:#e07b39;--c-matrimonio:#9b59b6;
  --c-anniversario:#c9a84c;--c-speciale:#48a999;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--text);
     font-family:'Cormorant Garamond',serif;font-size:18px;
     line-height:1.7;overflow-x:hidden}

/* ══════════════════════════════════════
   HERO
══════════════════════════════════════ */
.hero{position:relative;min-height:100vh;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;overflow:hidden;background:var(--dark)}
.hero-bg{position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(201,168,76,.22) 0%,transparent 70%),
  radial-gradient(ellipse 60% 80% at 80% 80%,rgba(201,168,76,.10) 0%,transparent 60%),
  linear-gradient(160deg,#1a1208 0%,#2e1f0a 50%,#1a1208 100%)}
.hero-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;background:var(--gold-l);
  border-radius:50%;opacity:0;animation:float-p linear infinite}
@keyframes float-p{
  0%{transform:translateY(100vh);opacity:0}
  10%{opacity:.7}90%{opacity:.4}
  100%{transform:translateY(-10vh) translateX(20px);opacity:0}}
.hero-content{position:relative;z-index:2;padding:2rem}
.hero-badge{display:inline-block;font-family:'Montserrat',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:.35em;text-transform:uppercase;
  color:var(--gold);border:1px solid var(--gold-d);padding:6px 20px;
  border-radius:100px;margin-bottom:2rem;
  opacity:0;animation:fade-up .8s .3s forwards}
.hero-date-top{font-family:'Montserrat',sans-serif;font-size:13px;
  font-weight:500;letter-spacing:.25em;color:var(--gold-l);
  margin-bottom:.8rem;opacity:0;animation:fade-up .8s .45s forwards}
.hero-number{font-family:'Playfair Display',serif;
  font-size:clamp(7rem,22vw,16rem);font-weight:700;line-height:.85;
  color:transparent;background:linear-gradient(135deg,var(--gold-l) 0%,var(--gold) 50%,var(--gold-d) 100%);
  -webkit-background-clip:text;background-clip:text;
  opacity:0;animation:fade-up .9s .5s forwards;display:block}
.hero-anni{font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(1.8rem,5vw,3.5rem);color:var(--gold-l);letter-spacing:.1em;
  opacity:0;animation:fade-up .8s .7s forwards;margin-top:-.5rem}
.hero-sep{width:80px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:1.5rem auto;opacity:0;animation:fade-up .8s .9s forwards}
.hero-names{font-family:'Playfair Display',serif;
  font-size:clamp(1.3rem,3.5vw,2.2rem);color:#fff;font-weight:400;
  letter-spacing:.08em;opacity:0;animation:fade-up .8s 1.1s forwards}
.hero-ann-date{font-family:'Montserrat',sans-serif;font-size:14px;
  font-weight:500;letter-spacing:.2em;color:var(--gold);margin-top:.6rem;
  opacity:0;animation:fade-up .8s 1.25s forwards}
.hero-years{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;
  letter-spacing:.3em;color:var(--muted);margin-top:.4rem;
  opacity:0;animation:fade-up .8s 1.4s forwards}
.hero-scroll{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--gold-d);font-family:'Montserrat',sans-serif;
  font-size:10px;letter-spacing:.25em;text-transform:uppercase;
  opacity:0;animation:fade-up .8s 1.9s forwards}
.scroll-line{width:1px;height:50px;
  background:linear-gradient(to bottom,var(--gold),transparent);
  animation:spulse 2s 2s infinite}
@keyframes spulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fade-up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════
   TIMELINE SECTION
══════════════════════════════════════ */
.timeline-section{padding:6rem 0 8rem;position:relative}
.section-header{text-align:center;margin-bottom:5rem;padding:0 1.5rem}
.section-label{font-family:'Montserrat',sans-serif;font-size:10px;
  font-weight:600;letter-spacing:.4em;text-transform:uppercase;
  color:var(--gold);margin-bottom:1rem}
.section-title{font-family:'Playfair Display',serif;
  font-size:clamp(2rem,5vw,3.5rem);font-weight:400;color:var(--dark);line-height:1.2}
.section-title em{font-style:italic;color:var(--gold-d)}

/* ── TIMELINE CONTAINER ── */
.timeline{position:relative;max-width:1000px;margin:0 auto;padding:0 1.5rem}
/* vertical axis */
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;
  width:2px;background:linear-gradient(to bottom,transparent 0%,var(--line) 5%,var(--line) 95%,transparent 100%);
  transform:translateX(-50%)}

/* ── YEAR BLOCK ── */
.year-block{position:relative;margin-bottom:1rem}
.year-pill{position:absolute;left:50%;transform:translateX(-50%);
  background:var(--dark);color:var(--gold-l);
  font-family:'Playfair Display',serif;font-size:.85rem;font-weight:700;
  padding:5px 18px;border-radius:100px;border:1px solid var(--gold-d);
  z-index:3;white-space:nowrap;top:0}
.year-spacer{height:46px}

/* ── TIMELINE ITEM ── */
.timeline-item{position:relative;width:44%;margin-bottom:3.5rem;
  opacity:0;transform:translateY(40px);
  transition:opacity .6s ease,transform .6s ease}
.timeline-item.visible{opacity:1;transform:translateY(0)}
/* left side */
.timeline-item.left{margin-left:0;margin-right:auto}
/* right side */
.timeline-item.right{margin-left:auto;margin-right:0}

/* dot on the axis */
.timeline-item::after{content:'';position:absolute;top:2rem;
  width:14px;height:14px;background:var(--gold);
  border:3px solid var(--cream);border-radius:50%;
  box-shadow:0 0 0 2px var(--gold);z-index:2}
.timeline-item.left::after{right:-7.5%;transform:translateX(50%)}
.timeline-item.right::after{left:-7.5%;transform:translateX(-50%)}

/* connector line */
.timeline-item::before{content:'';position:absolute;top:2.45rem;
  width:7%;height:1px;background:var(--line)}
.timeline-item.left::before{right:-7%}
.timeline-item.right::before{left:-7%}

/* ── CARD ── */
.card{background:#fff;border-radius:var(--radius);overflow:hidden;
  box-shadow:0 4px 20px var(--shadow);cursor:pointer;
  transition:transform var(--tr),box-shadow var(--tr);
  border:1px solid rgba(201,168,76,.15)}
.card:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 16px 40px var(--shadow)}
.card:focus{outline:2px solid var(--gold);outline-offset:3px}
.card-img{position:relative;height:200px;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;
  transition:transform .6s ease;display:block}
.card:hover .card-img img{transform:scale(1.08)}
.card-img-ov{position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(20,10,0,.55) 100%)}
.card-cat{position:absolute;top:12px;left:12px;
  font-family:'Montserrat',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;color:#fff;
  background:var(--cc,var(--gold));padding:4px 10px;border-radius:100px}
.card-year-b{position:absolute;bottom:12px;right:12px;
  font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;
  color:rgba(255,255,255,.9);text-shadow:0 2px 8px rgba(0,0,0,.5)}
/* data evento sulla card */
.card-event-date{position:absolute;top:12px;right:12px;
  font-family:'Montserrat',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.15em;color:rgba(255,255,255,.9);
  background:rgba(0,0,0,.45);padding:3px 8px;border-radius:100px;
  backdrop-filter:blur(4px)}
.card-body{padding:1.2rem 1.4rem 1.4rem}
.card-month{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:500;
  letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem}
.card-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;
  color:var(--dark);line-height:1.3;margin-bottom:.6rem}
.card-emoji{font-size:1.4rem;margin-right:6px}
.card-desc{font-size:.88rem;color:var(--muted);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-clamp:3;overflow:hidden}
.card-cta{display:inline-flex;align-items:center;gap:6px;margin-top:.9rem;
  font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;color:var(--gold-d);
  transition:gap var(--tr),color var(--tr)}
.card-cta::after{content:'→';transition:transform var(--tr)}
.card:hover .card-cta{color:var(--gold);gap:10px}
.card:hover .card-cta::after{transform:translateX(4px)}

/* ══════════════════════════════════════
   SIDE PANEL (detail)
══════════════════════════════════════ */
.panel-overlay{position:fixed;inset:0;background:var(--overlay);
  z-index:900;opacity:0;pointer-events:none;
  transition:opacity .35s ease;backdrop-filter:blur(4px)}
.panel-overlay.active{opacity:1;pointer-events:all}

.panel{position:fixed;top:0;right:0;width:var(--panel-w);max-width:100vw;
  height:100vh;background:var(--cream);z-index:910;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 40px rgba(0,0,0,.3)}
.panel-overlay.active .panel{transform:translateX(0)}

/* panel sticky top bar */
.panel-topbar{display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.4rem;background:var(--dark);flex-shrink:0;
  border-bottom:1px solid var(--gold-d)}
.panel-topbar-left{display:flex;align-items:center;gap:.8rem}
.panel-topbar-emoji{font-size:1.6rem}
.panel-topbar-meta{display:flex;flex-direction:column}
.panel-topbar-year{font-family:'Playfair Display',serif;font-size:1.1rem;
  font-weight:700;color:var(--gold-l)}
.panel-topbar-date{font-family:'Montserrat',sans-serif;font-size:10px;
  letter-spacing:.2em;color:var(--muted)}
.panel-close{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;width:38px;height:38px;border-radius:50%;font-size:1.1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background var(--tr),transform var(--tr);flex-shrink:0}
.panel-close:hover{background:var(--gold);color:var(--dark);transform:rotate(90deg)}

/* panel scrollable body */
.panel-body{flex:1;overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:var(--gold-d) transparent}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:10px}

/* cover hero inside panel */
.panel-cover{position:relative;height:240px;overflow:hidden;flex-shrink:0}
.panel-cover img{width:100%;height:100%;object-fit:cover;display:block}
.panel-cover-ov{position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 30%,rgba(20,10,0,.7) 100%)}
.panel-cat-badge{position:absolute;top:14px;left:14px;
  font-family:'Montserrat',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;color:#fff;
  background:var(--cc,var(--gold));padding:4px 12px;border-radius:100px}
.panel-cover-title{position:absolute;bottom:14px;left:14px;right:14px;
  font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;
  color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.6);line-height:1.2}
/* event date shown prominently in cover */
.panel-event-date-cover{position:absolute;top:14px;right:14px;
  font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.2em;color:#fff;
  background:rgba(0,0,0,.5);padding:5px 12px;border-radius:100px;
  backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2)}

.panel-content{padding:1.6rem}

/* event full date block */
.panel-full-date{display:flex;align-items:center;gap:.7rem;
  background:rgba(201,168,76,.10);border:1px solid rgba(201,168,76,.25);
  border-radius:12px;padding:.8rem 1.1rem;margin-bottom:1.4rem}
.panel-full-date-icon{font-size:1.3rem}
.panel-full-date-text{font-family:'Montserrat',sans-serif;font-size:12px;
  font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-d)}
.panel-full-date-val{font-family:'Playfair Display',serif;font-size:1.05rem;
  font-weight:700;color:var(--dark);margin-top:1px}

.panel-desc{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.15rem;line-height:1.9;color:var(--charcoal);margin-bottom:2rem}

/* gallery inside panel */
.panel-gallery-label{font-family:'Montserrat',sans-serif;font-size:10px;
  font-weight:600;letter-spacing:.3em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem}
.panel-gallery-label::before{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--gold-d),transparent)}
.panel-gallery-label::after{content:'';flex:1;height:1px;background:linear-gradient(to left,var(--gold-d),transparent)}

.gallery-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:.8rem;
  scrollbar-width:thin;scrollbar-color:var(--gold-d) transparent;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.gallery-scroll::-webkit-scrollbar{height:4px}
.gallery-scroll::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:10px}

.gphoto{flex:0 0 220px;height:160px;border-radius:12px;overflow:hidden;
  cursor:pointer;scroll-snap-align:start;position:relative;
  transition:transform var(--tr)}
.gphoto:hover{transform:scale(1.03)}
.gphoto img{width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .5s ease}
.gphoto:hover img{transform:scale(1.1)}
.gphoto-ov{position:absolute;inset:0;background:rgba(0,0,0,0);
  display:flex;align-items:center;justify-content:center;
  transition:background var(--tr)}
.gphoto:hover .gphoto-ov{background:rgba(0,0,0,.3)}
.gphoto-zoom{opacity:0;font-size:1.5rem;color:#fff;
  transition:opacity var(--tr)}
.gphoto:hover .gphoto-zoom{opacity:1}

/* ══════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════ */
.lb-ov{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:2000;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s ease}
.lb-ov.active{opacity:1;pointer-events:all}
.lb-img{max-width:90vw;max-height:86vh;border-radius:8px;
  object-fit:contain;transform:scale(.9);transition:transform .3s ease}
.lb-ov.active .lb-img{transform:scale(1)}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;
  background:rgba(255,255,255,.15);border:none;color:#fff;
  width:44px;height:44px;border-radius:50%;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--tr)}
.lb-close:hover{background:rgba(255,255,255,.3)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.12);border:none;color:#fff;
  width:48px;height:48px;border-radius:50%;font-size:1.5rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--tr)}
.lb-nav:hover{background:rgba(255,255,255,.25)}
.lb-prev{left:1.5rem}.lb-next{right:1.5rem}
.lb-counter{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);
  font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:.2em;
  color:rgba(255,255,255,.6)}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
footer{background:var(--dark);color:var(--muted);text-align:center;padding:3rem 1.5rem}
.footer-heart{font-size:2rem;margin-bottom:.8rem;display:block;
  animation:ph 1.8s ease-in-out infinite}
@keyframes ph{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.footer-names{font-family:'Playfair Display',serif;font-style:italic;
  font-size:1.3rem;color:var(--gold-l);margin-bottom:.4rem}
.footer-info{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:.3em}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:768px){
  :root{--panel-w:100vw}
  .timeline::before{left:24px}
  .timeline-item{width:calc(100% - 56px);margin-left:56px!important;margin-right:0!important}
  .timeline-item::after{left:-40px!important;right:auto!important;transform:none!important}
  .timeline-item::before{left:-32px!important;right:auto!important;width:32px}
  .year-pill{left:24px;transform:translateX(-50%);font-size:.75rem}
  .panel-cover{height:200px}
  .gphoto{flex:0 0 180px;height:130px}
  .lb-nav{display:none}
}
@media(max-width:480px){
  .card-img{height:170px}
  .panel-content{padding:1.2rem}
  .panel-desc{font-size:1.05rem}
}
</style>
</head>
<body>

<!-- ══════════ HERO ══════════ -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-particles" id="particles"></div>
  <div class="hero-content">
    <div class="hero-badge">Celebrazione Speciale</div>
    <div class="hero-date-top" id="hero-date-top"></div>
    <span class="hero-number" id="hero-num">25</span>
    <div class="hero-anni">Anni Insieme</div>
    <div class="hero-sep"></div>
    <div class="hero-names" id="hero-names"></div>
    <div class="hero-ann-date" id="hero-ann-date"></div>
    <div class="hero-years" id="hero-years"></div>
  </div>
  <div class="hero-scroll"><span>Scorri</span><div class="scroll-line"></div></div>
</section>

<!-- ══════════ TIMELINE ══════════ -->
<main class="timeline-section">
  <div class="section-header">
    <p class="section-label">La nostra storia</p>
    <h1 class="section-title">Ogni momento<br><em>per sempre</em></h1>
  </div>
  <div class="timeline" id="timeline"></div>
</main>

<!-- ══════════ FOOTER ══════════ -->
<footer>
  <span class="footer-heart">♥</span>
  <div class="footer-names" id="footer-names"></div>
  <div class="footer-info" id="footer-info"></div>
</footer>

<!-- ══════════ SIDE PANEL ══════════ -->
<div class="panel-overlay" id="panel-overlay">
  <div class="panel" id="panel" role="dialog" aria-modal="true" aria-labelledby="panel-title">

    <!-- sticky top bar -->
    <div class="panel-topbar">
      <div class="panel-topbar-left">
        <span class="panel-topbar-emoji" id="p-emoji">✨</span>
        <div class="panel-topbar-meta">
          <span class="panel-topbar-year" id="p-year">2000</span>
          <span class="panel-topbar-date" id="p-date-top">Gennaio 2000</span>
        </div>
      </div>
      <button class="panel-close" id="panel-close" aria-label="Chiudi">✕</button>
    </div>

    <div class="panel-body" id="panel-body">
      <!-- cover -->
      <div class="panel-cover">
        <img id="p-cover" src="" alt=""/>
        <div class="panel-cover-ov"></div>
        <span class="panel-cat-badge" id="p-cat-badge" style="background:var(--cc,var(--gold))"></span>
        <div class="panel-event-date-cover" id="p-event-date-cover">📅 Gennaio 2000</div>
        <div class="panel-cover-title" id="panel-title">Titolo</div>
      </div>

      <div class="panel-content">
        <!-- prominent date block -->
        <div class="panel-full-date">
          <span class="panel-full-date-icon">📅</span>
          <div>
            <div class="panel-full-date-text">Data dell'evento</div>
            <div class="panel-full-date-val" id="p-full-date">Gennaio 2000</div>
          </div>
        </div>

        <p class="panel-desc" id="p-desc"></p>

        <div class="panel-gallery-label">Fotografie</div>
        <div class="gallery-scroll" id="p-gallery"></div>
      </div>
    </div>

  </div>
</div>

<!-- ══════════ LIGHTBOX ══════════ -->

/* ── Particles ── */
const pc = document.getElementById('particles');
for(let i=0;i<40;i++){
  const p=document.createElement('div');p.className='particle';
  p.style.cssText=`left:${Math.random()*100}%;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*8}s`;
  pc.appendChild(p);
}

/* ── Build Timeline ── */
const tl = document.getElementById('timeline');
let lastYear = null;
let sideIdx  = 0; /* toggle left/right */

events.forEach(ev => {
  const meta = CAT[ev.category] || CAT.speciale;
  const dateStr = ev.day + ' ' + ev.month + ' ' + ev.year;

  /* Year block */
  if(ev.year !== lastYear){
    const yb = document.createElement('div');
    yb.className = 'year-block';
    yb.innerHTML = `<div class="year-spacer"></div><div class="year-pill">${ev.year}</div>`;
    tl.appendChild(yb);
    lastYear = ev.year;
    sideIdx = 0; /* reset alternation each year so first of year is always left */
  }

  const side = (sideIdx % 2 === 0) ? 'left' : 'right';
  sideIdx++;

  const item = document.createElement('div');
  item.className = `timeline-item ${side}`;

  item.innerHTML = `
    <div class="card" tabindex="0" role="button" aria-label="Apri dettaglio: ${ev.title}">
      <div class="card-img">
        <img src="${ev.cover}" alt="${ev.title}" loading="lazy"/>
        <div class="card-img-ov"></div>
        <span class="card-cat" style="background:${meta.color}">${meta.label}</span>
        <span class="card-event-date">${dateStr}</span>
        <span class="card-year-b">${ev.year}</span>
      </div>
      <div class="card-body">
        <div class="card-month">${ev.month} ${ev.year}</div>
        <h2 class="card-title"><span class="card-emoji">${ev.emoji}</span>${ev.title}</h2>
        <p class="card-desc">${ev.description}</p>
        <span class="card-cta">Vedi dettagli</span>
      </div>
    </div>`;

  const card = item.querySelector('.card');
  const open = () => openPanel(ev);
  card.addEventListener('click', open);
  card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') open(); });
  tl.appendChild(item);
});

/* ── Scroll reveal ── */
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); } });
},{threshold:0.1});
document.querySelectorAll('.timeline-item').forEach(i => obs.observe(i));

/* ══════════════════════════════

══════════════════════════════ */
let currentPhotos = [];
let lbIdx = 0;

function openPanel(ev){
  const meta = CAT[ev.category] || CAT.speciale;
  const dateStr = ev.day + ' ' + ev.month + ' ' + ev.year;
  currentPhotos = ev.photos || [ev.cover];

  document.getElementById('p-emoji').textContent      = ev.emoji;
  document.getElementById('p-year').textContent       = ev.year;
  document.getElementById('p-date-top').textContent   = dateStr;
  document.getElementById('p-cover').src              = ev.cover;
  document.getElementById('p-cover').alt              = ev.title;
  document.getElementById('panel-title').textContent  = ev.title;
  document.getElementById('p-desc').textContent       = ev.description;
  document.getElementById('p-full-date').textContent  = dateStr;
  document.getElementById('p-event-date-cover').textContent = '📅 ' + dateStr;

  const badge = document.getElementById('p-cat-badge');
  badge.textContent = meta.label;
  badge.style.background = meta.color;

  /* Gallery */
  const g = document.getElementById('p-gallery');
  g.innerHTML = '';
  currentPhotos.forEach((url,i) => {
    const d = document.createElement('div');
    d.className = 'gphoto';
    d.innerHTML = `<img src="${url}" alt="Foto ${i+1}" loading="lazy"/><div class="gphoto-ov"><span class="gphoto-zoom">🔍</span></div>`;
    d.addEventListener('click', () => openLb(i));
    g.appendChild(d);
  });

  document.getElementById('panel-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  document.getElementById('panel-body').scrollTop = 0;
  document.getElementById('panel-close').focus();
}

function closePanel(){
  document.getElementById('panel-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('panel-close').addEventListener('click', closePanel);
document.getElementById('panel-overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('panel-overlay')) closePanel();
});

/* ══════════════════════════════
   LIGHTBOX
══════════════════════════════ */
function openLb(idx){
  lbIdx = idx;
  document.getElementById('lb-img').src = currentPhotos[lbIdx];
  document.getElementById('lb-counter').textContent = (lbIdx+1) + ' / ' + currentPhotos.length;
  document.getElementById('lb-ov').classList.add('active');
}
function closeLb(){
  document.getElementById('lb-ov').classList.remove('active');
}
function lbNext(){
  lbIdx = (lbIdx+1) % currentPhotos.length;
  document.getElementById('lb-img').src = currentPhotos[lbIdx];
  document.getElementById('lb-counter').textContent = (lbIdx+1)+' / '+currentPhotos.length;
}
function lbPrev(){
  lbIdx = (lbIdx-1+currentPhotos.length) % currentPhotos.length;
  document.getElementById('lb-img').src = currentPhotos[lbIdx];
  document.getElementById('lb-counter').textContent = (lbIdx+1)+' / '+currentPhotos.length;
}

document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-next').addEventListener('click', lbNext);
document.getElementById('lb-prev').addEventListener('click', lbPrev);
document.getElementById('lb-ov').addEventListener('click', e => {
  if(e.target === document.getElementById('lb-ov')) closeLb();
});

/* Touch swipe lightbox */
let tx = 0;
document.getElementById('lb-ov').addEventListener('touchstart', e => { tx = e.touches[0].clientX; },{passive:true});
document.getElementById('lb-ov').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if(Math.abs(dx)>50){ dx<0 ? lbNext() : lbPrev(); }
},{passive:true});

document.addEventListener('keydown', e => {
  if(document.getElementById('lb-ov').classList.contains('active')){
    if(e.key==='ArrowRight') lbNext();
    if(e.key==='ArrowLeft')  lbPrev();
    if(e.key==='Escape')     closeLb();
    return;
  }
  if(e.key==='Escape') closePanel();
});
</script>
