<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>25° Anniversario — Marco & Sofia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="nav" id="nav">
      <div class="nav-inner">
        <span class="nav-couple" id="nav-couple">Marco & Sofia</span>
        <span class="nav-years">XXV · 2000–2025</span>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-number" aria-hidden="true">25</div>
      <div class="hero-content">
        <p class="hero-label">Venticinque Anni Insieme</p>
        <h1 class="hero-title" id="hero-couple">Marco & Sofia</h1>
        <div class="hero-divider">
          <span></span><span class="hero-diamond">◆</span><span></span>
        </div>
        <p class="hero-dates" id="hero-dates">15 Giugno 2000 — 15 Giugno 2025</p>
        <p class="hero-sub">Una storia d'amore, capitolo dopo capitolo</p>
      </div>
      <div class="hero-scroll-hint">
        <span>Scorri</span>
        <div class="scroll-line"></div>
      </div>
    </section>

    <!-- TIMELINE -->
    <main class="tl-wrap">
      <div class="tl-spine"></div>
      <div class="tl-events" id="tl-events"></div>
    </main>

    <!-- MODAL -->
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal" id="modal" role="dialog" aria-modal="true">
        <button class="modal-x" id="modal-close" aria-label="Chiudi">✕</button>
        <div class="modal-img-wrap">
          <img id="modal-cover" src="" alt="" />
          <div class="modal-img-overlay">
            <span class="modal-cat" id="modal-cat"></span>
          </div>
        </div>
        <div class="modal-body">
          <p class="modal-date" id="modal-date"></p>
          <h2 class="modal-title" id="modal-title"></h2>
          <p class="modal-desc" id="modal-desc"></p>
          <div class="modal-gallery-label">Fotografie</div>
          <div class="modal-gallery" id="modal-gallery"></div>
        </div>
      </div>
    </div>

    <!-- LIGHTBOX -->
    <div class="lb" id="lb">
      <button class="lb-x" id="lb-close">✕</button>
      <button class="lb-btn lb-prev" id="lb-prev">‹</button>
      <button class="lb-btn lb-next" id="lb-next">›</button>
      <div class="lb-stage"><img id="lb-img" src="" alt="" /></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
